title: Harry Zhao
description: "Software Developer | Blog & Portfolio"
url: "https://harry-zhao-au.github.io"
baseurl: ""

author:
  name: Harry Zhao
  email: harry.zhao19@gmail.com
  github: Harry-Zhao-AU
  linkedin: ""

markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "page"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - plan.md

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
