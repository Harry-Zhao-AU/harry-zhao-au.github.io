---
layout: default
---

<article class="page">
  <h1>{{ page.title }}</h1>
  {{ content }}

  <ul class="project-list">
    {% for project in site.data.projects %}
      <li>
        <a href="{{ project.github }}" target="_blank" rel="noopener">{{ project.name }}</a> — {{ project.description }}
        <span class="project-tech">({{ project.technologies | join: ", " }})</span>
      </li>
    {% endfor %}
  </ul>
</article>
