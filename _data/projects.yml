- name: "BankForge"
  description: "Australian core banking platform demonstrating enterprise microservices patterns — 4 Java/Spring Boot services with local ACID transactions, Saga/Outbox/CDC messaging, full observability (Jaeger + Prometheus + Loki + Grafana), Istio service mesh on Kubernetes, and a Claude MCP server for AI-driven root cause analysis."
  technologies: ["Java", "Spring Boot", "Kafka", "PostgreSQL", "Kubernetes", "Istio", "Kong", "Neo4j", "Redis", "OpenTelemetry", "Outbox-CDC", "Saga", "MCP"]
  github: "https://github.com/Harry-Zhao-AU/BankForge"
  live: ""

- name: "PulsePost"
  description: "AI-powered article pipeline that monitors trending AI topics, generates articles in your voice, seeks approval via Telegram bot, and auto-publishes to your blog. Infrastructure as Code on Azure — Functions, Service Bus, and Application Insights provisioned via Terraform and Bicep, deployed through GitHub Actions CI/CD."
  technologies: ["C#", "Azure Functions", "Service Bus", "Application Insights", "Terraform", "Bicep", "GitHub Actions", "CI/CD", "Python", "Telegram Bot"]
  github: "https://github.com/Harry-Zhao-AU/PulsePost"
  live: ""

- name: "NanoBotTS"
  description: "Lightweight AI Agent Framework — full agent loop with LLM reasoning, tool use, and parallel execution. Features a decoupled MessageBus (CLI/Telegram), two-tier memory system, token-aware context management, and ProviderRegistry supporting Azure OpenAI, OpenAI, Groq, and Ollama."
  technologies: ["TypeScript", "Node.js"]
  github: "https://github.com/Harry-Zhao-AU/NanoBotTS"
  live: ""

- name: "ResumeGraph"
  description: "HR Skill Graph tool — generates fake resumes, extracts employee-skill relationships into Neo4j using GraphRAG, and exposes queries via FastAPI and MCP server. Integrates with NanoBotTS as an HTTP tool."
  technologies: ["Python", "Neo4j", "LlamaIndex", "FastAPI", "MCP"]
  github: "https://github.com/Harry-Zhao-AU/ResumeGraph"
  live: ""
